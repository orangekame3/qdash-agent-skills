name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  package:
    name: Package check (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
          - 22
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Check CLI
        run: npm run check

      - name: Check package contents
        run: npm pack --dry-run
